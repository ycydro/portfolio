<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/avatar.ico" />
    <link rel="shortcut icon" href="/avatar.ico" type="image/x-icon" />
    <link rel="apple-touch-icon" href="/avatar.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/avatar.png" />
    <meta property="og:url" content="https://cydcastillo.tech/" />
    <meta property="og:site_name" content="Cyd Castillo" />
    <meta property="og:title" content="Cyd Castillo" />
    <meta
      content="Portfolio of Cyd Castillo, a full stack developer."
      property="og:description"
    />
    <meta
      content="Portfolio of Cyd Castillo, a full stack developer."
      name="description"
    />
    <meta
      name="keywords"
      content="Cyd Castillo, Cyd Castillo Portfolio, Portfolio, Software Engineer, Software Developer, Full Stack Developer, Web Developer"
    />
    <title>Cyd Castillo</title>
    <script>
      const loadTheme = () => {
        const storageKey = "theme"
        const root = document.documentElement

        const storedTheme = localStorage.getItem(storageKey)

        const systemTheme = window.matchMedia("(prefers-color-scheme: dark)")
          .matches
          ? "dark"
          : "light"

        let theme = storedTheme

        if (!theme || theme === "system") {
          theme = systemTheme
        }

        root.classList.remove("light", "dark")
        root.classList.add(theme)
      }
      loadTheme()
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
